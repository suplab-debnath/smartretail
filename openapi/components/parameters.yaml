Page:
  name: page
  in: query
  description: Zero-based page number
  required: false
  schema:
    type: integer
    format: int32
    minimum: 0
    default: 0
    example: 0

Size:
  name: size
  in: query
  description: Number of results per page (max 100)
  required: false
  schema:
    type: integer
    format: int32
    minimum: 1
    maximum: 100
    default: 20
    example: 20

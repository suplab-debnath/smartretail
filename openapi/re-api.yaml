openapi: "3.1.0"

info:
  title: SmartRetail Replenishment Engine API
  version: "1.0.0"
  description: |
    Manages purchase orders generated from inventory stock alerts.
    Consumes InventoryAlertEvents from SQS (published by IMS via EventBridge),
    looks up replenishment rules, computes order quantities, and inserts purchase
    orders with auto-approve or pending-approval status. Exposes REST endpoints
    for the SC Planner MFE to list, approve, and reject purchase orders.
  contact:
    name: SmartRetail Platform Team

servers:
  - url: http://localhost:8082
    description: Local development
  - url: https://{api-id}.execute-api.us-east-1.amazonaws.com/internal
    description: AWS internal stage

tags:
  - name: replenishment-orders
    description: Purchase order lifecycle management

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    WorkflowStatus:
      type: string
      description: Lifecycle status of a purchase order
      enum:
        - DRAFT
        - PENDING_APPROVAL
        - APPROVED
        - REJECTED
        - EXPIRED
        - DISPATCHED
        - ACKNOWLEDGED
        - SHIPPED
        - PARTIAL_DELIVERY
        - COMPLETED
        - CANCELLED
      example: PENDING_APPROVAL

    PoLineItem:
      type: object
      description: A single line item within a purchase order
      required:
        - lineId
        - skuId
        - quantity
        - unitCost
        - lineTotal
      additionalProperties: false
      properties:
        lineId:
          type: string
          format: uuid
          description: Unique identifier for this line item
          example: "c3d4e5f6-a7b8-9012-cdef-123456789012"
        skuId:
          type: string
          description: Stock Keeping Unit identifier
          example: "SKU-BEV-001"
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Number of units ordered
          example: 100
        unitCost:
          type: number
          format: double
          minimum: 0
          description: Cost per unit in GBP
          example: 8.50
        lineTotal:
          type: number
          format: double
          minimum: 0
          description: Total cost for this line (quantity × unitCost)
          example: 850.00

    PurchaseOrder:
      type: object
      description: A purchase order generated by the Replenishment Engine
      required:
        - poId
        - ruleId
        - supplierId
        - skuId
        - dcId
        - quantity
        - totalValue
        - workflowStatus
        - version
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        poId:
          type: string
          format: uuid
          description: Unique identifier for this purchase order
          example: "d4e5f6a7-b8c9-0123-defa-234567890123"
        ruleId:
          type: string
          format: uuid
          description: The replenishment rule that generated this order
          example: "44444444-0001-0000-0000-000000000001"
        supplierId:
          type: string
          description: Supplier identifier
          example: "11111111-0000-0000-0000-000000000001"
        skuId:
          type: string
          description: Stock Keeping Unit identifier
          example: "SKU-BEV-001"
        dcId:
          type: string
          description: Distribution Centre identifier
          example: "DC-LONDON"
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Number of units ordered
          example: 100
        totalValue:
          type: number
          format: double
          minimum: 0
          description: Total order value in GBP
          example: 850.00
        workflowStatus:
          $ref: '#/components/schemas/WorkflowStatus'
        version:
          type: integer
          format: int32
          minimum: 0
          description: Optimistic lock version — incremented on every status update
          example: 0
        alertId:
          type: string
          format: uuid
          description: The stock alert that triggered this purchase order (nullable)
          example: "e5f6a7b8-c9d0-1234-efab-345678901234"
        approvedBy:
          type: string
          description: Subject of the JWT of the approver (null until approved)
          example: "planner@smartretail.com"
        approvedAt:
          type: string
          format: date-time
          description: Timestamp when the order was approved (null until approved)
          example: "2026-05-16T10:00:00Z"
        rejectedBy:
          type: string
          description: Subject of the JWT of the rejector (null unless rejected)
          example: null
        rejectedAt:
          type: string
          format: date-time
          description: Timestamp when the order was rejected (null unless rejected)
          example: null
        rejectionReason:
          type: string
          description: Reason for rejection (null unless rejected)
          example: null
        lineItems:
          type: array
          description: Line items for this PO (only populated on single-PO GET)
          items:
            $ref: '#/components/schemas/PoLineItem'
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the order was created
          example: "2026-05-16T09:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of the most recent update
          example: "2026-05-16T09:00:00Z"

    PurchaseOrderPage:
      type: object
      description: Paginated list of purchase orders
      required:
        - orders
        - page
        - size
        - totalElements
      additionalProperties: false
      properties:
        orders:
          type: array
          description: Purchase orders on this page
          items:
            $ref: '#/components/schemas/PurchaseOrder'
        page:
          type: integer
          format: int32
          description: Current page number (0-indexed)
          example: 0
        size:
          type: integer
          format: int32
          description: Number of results on this page
          example: 20
        totalElements:
          type: integer
          format: int64
          description: Total number of matching purchase orders
          example: 5

    ApproveRequest:
      type: object
      description: Request body for approving a purchase order
      required:
        - version
      additionalProperties: false
      properties:
        version:
          type: integer
          format: int32
          minimum: 0
          description: Current optimistic lock version of the purchase order (must match DB)
          example: 0
        notes:
          type: string
          description: Optional approval notes
          example: "Approved — stock critically low"

    RejectRequest:
      type: object
      description: Request body for rejecting a purchase order
      required:
        - version
        - rejectionReason
      additionalProperties: false
      properties:
        version:
          type: integer
          format: int32
          minimum: 0
          description: Current optimistic lock version of the purchase order (must match DB)
          example: 0
        rejectionReason:
          type: string
          minLength: 1
          maxLength: 500
          description: Mandatory reason for rejection
          example: "Supplier lead time too long — escalating to alternative supplier"

    ManualReplenishmentRequest:
      type: object
      description: Request body for manually triggering a replenishment purchase order
      required:
        - skuId
        - dcId
        - quantity
      additionalProperties: false
      properties:
        skuId:
          type: string
          description: Stock Keeping Unit identifier
          example: "SKU-BEV-001"
        dcId:
          type: string
          description: Distribution Centre identifier
          example: "DC-LONDON"
        quantity:
          type: integer
          format: int32
          minimum: 1
          description: Number of units to order
          example: 200
        notes:
          type: string
          maxLength: 500
          description: Optional planner notes attached to this manual trigger
          example: "Pre-emptive restock ahead of promotion"

    ErrorResponse:
      $ref: './components/schemas.yaml#/ErrorResponse'

  parameters:
    Page:
      $ref: './components/parameters.yaml#/Page'
    Size:
      $ref: './components/parameters.yaml#/Size'

  responses:
    BadRequest:
      $ref: './components/responses.yaml#/BadRequest'
    Unauthorized:
      $ref: './components/responses.yaml#/Unauthorized'
    Forbidden:
      $ref: './components/responses.yaml#/Forbidden'
    NotFound:
      $ref: './components/responses.yaml#/NotFound'
    Conflict:
      $ref: './components/responses.yaml#/Conflict'
    InternalServerError:
      $ref: './components/responses.yaml#/InternalServerError'

paths:
  /v1/replenishment/orders:
    post:
      tags:
        - replenishment-orders
      operationId: createPurchaseOrder
      summary: Manually trigger a replenishment purchase order
      description: |
        Creates a new purchase order in PENDING_APPROVAL status, triggered manually
        by an SC_PLANNER. Looks up the active replenishment rule for the given SKU/DC
        to determine supplier and unit cost. Returns 404 if no active rule exists.
        Requires SC_PLANNER or ADMIN role.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManualReplenishmentRequest'
      responses:
        '201':
          description: Purchase order created in PENDING_APPROVAL status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    get:
      tags:
        - replenishment-orders
      operationId: listPurchaseOrders
      summary: List purchase orders
      description: |
        Returns paginated purchase orders. Supports filtering by workflow status,
        Distribution Centre, and SKU. Accessible by SC_PLANNER and ADMIN roles.
        lineItems are NOT populated in list responses — use GET /orders/{poId} for full detail.
      parameters:
        - name: status
          in: query
          description: Filter by workflow status
          required: false
          schema:
            $ref: '#/components/schemas/WorkflowStatus'
          example: PENDING_APPROVAL
        - name: dcId
          in: query
          description: Filter by Distribution Centre identifier
          required: false
          schema:
            type: string
            example: "DC-LONDON"
        - name: skuId
          in: query
          description: Filter by Stock Keeping Unit identifier
          required: false
          schema:
            type: string
            example: "SKU-BEV-001"
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Paginated list of purchase orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrderPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/replenishment/orders/{poId}:
    get:
      tags:
        - replenishment-orders
      operationId: getPurchaseOrder
      summary: Get a single purchase order with line items
      description: |
        Returns a single purchase order including its po_line_items.
        Accessible by SC_PLANNER and ADMIN roles.
      parameters:
        - name: poId
          in: path
          description: Purchase order UUID
          required: true
          schema:
            type: string
            format: uuid
            example: "d4e5f6a7-b8c9-0123-defa-234567890123"
      responses:
        '200':
          description: Purchase order with line items
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/replenishment/orders/{poId}/approve:
    post:
      tags:
        - replenishment-orders
      operationId: approvePurchaseOrder
      summary: Approve a purchase order
      description: |
        Transitions a purchase order from PENDING_APPROVAL to APPROVED.
        Uses optimistic locking — the request body must contain the current version.
        Approving from any status other than PENDING_APPROVAL returns 409.
        The X-Idempotency-Key header prevents duplicate approvals on retry.
        Requires SC_PLANNER or ADMIN role.
      parameters:
        - name: poId
          in: path
          description: Purchase order UUID
          required: true
          schema:
            type: string
            format: uuid
            example: "d4e5f6a7-b8c9-0123-defa-234567890123"
        - name: X-Idempotency-Key
          in: header
          description: Client-generated UUID to make this operation idempotent on retry
          required: true
          schema:
            type: string
            format: uuid
            example: "f6a7b8c9-d0e1-2345-fab6-456789012345"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRequest'
      responses:
        '200':
          description: Purchase order successfully approved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /v1/replenishment/orders/{poId}/reject:
    post:
      tags:
        - replenishment-orders
      operationId: rejectPurchaseOrder
      summary: Reject a purchase order
      description: |
        Transitions a purchase order from PENDING_APPROVAL to REJECTED.
        Uses optimistic locking — the request body must contain the current version.
        Rejecting from any status other than PENDING_APPROVAL returns 409.
        The X-Idempotency-Key header prevents duplicate rejections on retry.
        Requires SC_PLANNER or ADMIN role.
      parameters:
        - name: poId
          in: path
          description: Purchase order UUID
          required: true
          schema:
            type: string
            format: uuid
            example: "d4e5f6a7-b8c9-0123-defa-234567890123"
        - name: X-Idempotency-Key
          in: header
          description: Client-generated UUID to make this operation idempotent on retry
          required: true
          schema:
            type: string
            format: uuid
            example: "a7b8c9d0-e1f2-3456-abcd-567890123456"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        '200':
          description: Purchase order successfully rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseOrder'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

AWSTemplateFormatVersion: '2010-09-09'
Description: SmartRetail Compute Stack — SIS, IMS, RE services + Kinesis Consumer Lambda

Parameters:
  SrEnv:
    Type: String
  ImsSalesQueueArn:
    Type: String
    Description: ARN of the IMS sales SQS queue (from messaging stack)
  ImsSalesQueueUrl:
    Type: String
    Description: URL of the IMS sales SQS queue (from messaging stack)
  ReAlertQueueArn:
    Type: String
    Description: ARN of the RE alert FIFO SQS queue (from messaging stack)
  ReAlertQueueUrl:
    Type: String
    Description: URL of the RE alert FIFO SQS queue (from messaging stack)
  EventBusName:
    Type: String
    Description: Name of the EventBridge custom bus (from messaging stack)
  EventBusArn:
    Type: String
    Description: ARN of the EventBridge custom bus (from messaging stack)
  IdempotencyTableName:
    Type: String
    Description: DynamoDB idempotency table name (from data stack)
  IdempotencyTableArn:
    Type: String
    Description: DynamoDB idempotency table ARN (from data stack)
  RdsProxyEndpoint:
    Type: String
    Description: RDS Proxy endpoint (from data stack)
  EcsSecurityGroup:
    Type: String
    Description: Security group ID for ECS tasks (from network stack)
  PrivateSubnet1:
    Type: String
    Description: First private app subnet ID (from network stack)
  PrivateSubnet2:
    Type: String
    Description: Second private app subnet ID (from network stack)

Resources:

  # ── ECS Cluster ──────────────────────────────────────────────────────────────

  SmartRetailCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub smartretail-${SrEnv}
      ClusterSettings:
        - Name: containerInsights
          Value: enabled

  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartretail-ecs-execution-${SrEnv}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ── ECR Repositories ─────────────────────────────────────────────────────────

  SisRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-sis-${SrEnv}
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  ImsRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-ims-${SrEnv}
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  ReRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-re-${SrEnv}
      LifecyclePolicy:
        LifecyclePolicyText: |
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Keep last 10 images",
                "selection": {
                  "tagStatus": "any",
                  "countType": "imageCountMoreThan",
                  "countNumber": 10
                },
                "action": { "type": "expire" }
              }
            ]
          }

  KinesisConsumerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub smartretail-kinesis-consumer-${SrEnv}

  # ── SIS Task Role & Service ───────────────────────────────────────────────────

  SisTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartretail-sis-task-${SrEnv}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SisPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource: !Ref IdempotencyTableArn
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub arn:aws:s3:::smartretail-events-${SrEnv}/*
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Ref EventBusArn
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/smartretail_admin

  SisTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub smartretail-sis-${SrEnv}
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt SisTaskRole.Arn
      ContainerDefinitions:
        - Name: sis
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/smartretail-sis-${SrEnv}:latest
          PortMappings:
            - ContainerPort: 8080
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8080/actuator/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: aws
            - Name: SMARTRETAIL_ENV
              Value: !Ref SrEnv
            - Name: RDS_PROXY_ENDPOINT
              Value: !Ref RdsProxyEndpoint
            - Name: DB_SCHEMA
              Value: sales
            - Name: DB_USERNAME
              Value: smartretail_admin
            - Name: IDEMPOTENCY_TABLE_NAME
              Value: !Ref IdempotencyTableName
            - Name: EVENTBRIDGE_BUS_NAME
              Value: !Ref EventBusName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /smartretail/sis/${SrEnv}
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  SisLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /smartretail/sis/${SrEnv}
      RetentionInDays: 30

  SisService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub smartretail-sis-${SrEnv}
      Cluster: !Ref SmartRetailCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref SisTaskDefinition
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      ServiceRegistries:
        - RegistryArn: !GetAtt SisDiscoveryService.Arn

  SisDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: !Sub smartretail-sis-${SrEnv}
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ── IMS Task Role & Service ───────────────────────────────────────────────────

  ImsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartretail-ims-task-${SrEnv}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ImsPermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Ref ImsSalesQueueArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Ref EventBusArn
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/smartretail_admin

  ImsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub smartretail-ims-${SrEnv}
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt ImsTaskRole.Arn
      ContainerDefinitions:
        - Name: ims
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/smartretail-ims-${SrEnv}:latest
          PortMappings:
            - ContainerPort: 8081
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8081/actuator/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: aws
            - Name: SMARTRETAIL_ENV
              Value: !Ref SrEnv
            - Name: RDS_PROXY_ENDPOINT
              Value: !Ref RdsProxyEndpoint
            - Name: DB_SCHEMA
              Value: inventory
            - Name: DB_USERNAME
              Value: smartretail_admin
            - Name: IMS_SALES_QUEUE_URL
              Value: !Ref ImsSalesQueueUrl
            - Name: EVENTBRIDGE_BUS_NAME
              Value: !Ref EventBusName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /smartretail/ims/${SrEnv}
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ImsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /smartretail/ims/${SrEnv}
      RetentionInDays: 30

  ImsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub smartretail-ims-${SrEnv}
      Cluster: !Ref SmartRetailCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ImsTaskDefinition
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      ServiceRegistries:
        - RegistryArn: !GetAtt ImsDiscoveryService.Arn

  ImsDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: !Sub smartretail-ims-${SrEnv}
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ── RE Task Role & Service ────────────────────────────────────────────────────

  ReTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartretail-re-task-${SrEnv}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RePermissions
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                  - sqs:ChangeMessageVisibility
                Resource: !Ref ReAlertQueueArn
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Ref EventBusArn
              - Effect: Allow
                Action:
                  - rds-db:connect
                Resource: !Sub arn:aws:rds-db:${AWS::Region}:${AWS::AccountId}:dbuser:*/smartretail_admin

  ReTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub smartretail-re-${SrEnv}
      Cpu: 512
      Memory: 1024
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      TaskRoleArn: !GetAtt ReTaskRole.Arn
      ContainerDefinitions:
        - Name: re
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/smartretail-re-${SrEnv}:latest
          PortMappings:
            - ContainerPort: 8082
          HealthCheck:
            Command:
              - CMD-SHELL
              - curl -f http://localhost:8082/actuator/health || exit 1
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 60
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: aws
            - Name: SMARTRETAIL_ENV
              Value: !Ref SrEnv
            - Name: RDS_PROXY_ENDPOINT
              Value: !Ref RdsProxyEndpoint
            - Name: DB_SCHEMA
              Value: replenishment
            - Name: DB_USERNAME
              Value: smartretail_admin
            - Name: RE_ALERT_QUEUE_URL
              Value: !Ref ReAlertQueueUrl
            - Name: EVENTBRIDGE_BUS_NAME
              Value: !Ref EventBusName
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub /smartretail/re/${SrEnv}
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ReLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /smartretail/re/${SrEnv}
      RetentionInDays: 30

  ReService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub smartretail-re-${SrEnv}
      Cluster: !Ref SmartRetailCluster
      DesiredCount: 1
      LaunchType: FARGATE
      TaskDefinition: !Ref ReTaskDefinition
      EnableExecuteCommand: true
      HealthCheckGracePeriodSeconds: 60
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          SecurityGroups:
            - !Ref EcsSecurityGroup
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
      ServiceRegistries:
        - RegistryArn: !GetAtt ReDiscoveryService.Arn

  ReDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: !Sub smartretail-re-${SrEnv}
      NamespaceId: !Ref CloudMapNamespace
      DnsConfig:
        DnsRecords:
          - Type: A
            TTL: 10
      HealthCheckCustomConfig:
        FailureThreshold: 1

  # ── Cloud Map Namespace ───────────────────────────────────────────────────────

  CloudMapNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: smartretail.local
      Vpc: !Ref EcsSecurityGroup   # placeholder — replace with VpcId parameter

  # ── Kinesis Consumer Lambda ───────────────────────────────────────────────────

  KinesisConsumerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub smartretail-kinesis-consumer-${SrEnv}
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  KinesisConsumerFunction:
    Type: AWS::Lambda::Function
    Properties:
      PackageType: Image
      FunctionName: !Sub smartretail-kinesis-consumer-${SrEnv}
      Role: !GetAtt KinesisConsumerRole.Arn
      Code:
        ImageUri: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/smartretail-kinesis-consumer-${SrEnv}:latest
      Timeout: 300
      MemorySize: 512
      Environment:
        Variables:
          SIS_ENDPOINT: !Sub http://smartretail-sis-${SrEnv}.smartretail.local:8080
          IDEMPOTENCY_TABLE_NAME: !Ref IdempotencyTableName
          ENV: !Ref SrEnv

Outputs:
  ClusterName:
    Value: !Ref SmartRetailCluster
    Export:
      Name: !Sub SmartRetail-${SrEnv}-ClusterName

  SisServiceName:
    Value: !Sub smartretail-sis-${SrEnv}
    Export:
      Name: !Sub SmartRetail-${SrEnv}-SisServiceName

  ImsServiceName:
    Value: !Sub smartretail-ims-${SrEnv}
    Export:
      Name: !Sub SmartRetail-${SrEnv}-ImsServiceName

  ReServiceName:
    Value: !Sub smartretail-re-${SrEnv}
    Export:
      Name: !Sub SmartRetail-${SrEnv}-ReServiceName

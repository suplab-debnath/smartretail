name: Coverage Reports

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-coverage:
    name: Backend (JaCoCo Aggregate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run tests and generate aggregate report
        run: |
          mvn verify \
            -pl backend/services/sis,backend/services/ims,backend/services/re,backend/services/ars,backend/services/dfs,backend/services/sup,backend/services/pps,backend/coverage \
            --also-make \
            --no-transfer-progress

      - name: Upload JaCoCo aggregate report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/coverage/target/site/jacoco-aggregate/
          retention-days: 30

  frontend-coverage:
    name: Frontend (Vitest + LCOV Merge)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'                    # ← Added caching (recommended)
          cache-dependency-path: |
            mfe/store-manager/package-lock.json
            mfe/sc-planner/package-lock.json
            mfe/executive/package-lock.json
            mfe/supplier/package-lock.json

      - name: Install lcov
        run: sudo apt-get install -y lcov

      # === FIXED INSTALL STEPS ===
      - name: Install dependencies — store-manager
        run: npm ci
        working-directory: mfe/store-manager

      - name: Install dependencies — sc-planner
        run: npm ci
        working-directory: mfe/sc-planner

      - name: Install dependencies — executive
        run: npm ci
        working-directory: mfe/executive

      - name: Install dependencies — supplier
        run: npm ci
        working-directory: mfe/supplier

      # Optional: Force install rollup linux binary (extra safety)
      - name: Ensure Rollup Linux binary - store-manager
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: mfe/store-manager

      - name: Ensure Rollup Linux binary - sc-planner
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: mfe/sc-planner

      - name: Ensure Rollup Linux binary - executive
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: mfe/executive

      - name: Ensure Rollup Linux binary - supplier
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: mfe/supplier

      - name: Run coverage — store-manager
        run: npm run test:coverage
        working-directory: mfe/store-manager

      - name: Run coverage — sc-planner
        run: npm run test:coverage
        working-directory: mfe/sc-planner

      - name: Run coverage — executive
        run: npm run test:coverage
        working-directory: mfe/executive

      - name: Run coverage — supplier
        run: npm run test:coverage
        working-directory: mfe/supplier

      - name: Merge LCOV reports
        run: bash scripts/merge-mfe-coverage.sh

      - name: Upload merged frontend report
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: dist/coverage/frontend/
          retention-days: 30

spring:
  application:
    name: sis
  profiles:
    group:
      dev: [aws]
  datasource:
    url: jdbc:postgresql://${RDS_PROXY_ENDPOINT:localhost}:5432/smartretail?currentSchema=${DB_SCHEMA:sales}
    username: ${DB_USERNAME:smartretail_admin}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SmartRetail-SIS-Pool
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

server:
  port: 8080
  shutdown: graceful

logging:
  config: classpath:logback-spring.xml

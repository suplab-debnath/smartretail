asyncapi: 2.6.0
info:
  title: Sales Ingestion Service — Async API
  version: 2.0.0
  description: |
    SIS receives POS events from Amazon Data Firehose via an HTTPS endpoint and publishes
    a SalesTransactionEvent to the EventBridge bus after every successfully ingested and
    deduplicated transaction.

    Inbound path:
      Firehose (DirectPut) → API GW HTTPS → VPC Link → NLB → SIS /v1/ingest/events
      SIS FirehoseBatchFilter intercepts X-Amz-Firehose-Request-Id, base64-decodes each
      record, deduplicates against sales.idempotency_keys in RDS, and always returns HTTP 200
      (Firehose contract). Non-Firehose callers fall through to the normal Spring MVC path
      (202 on success, 409 on duplicate).

    EventBridge routing:
      - smartretail-ims-sales-{env}   (Standard SQS)  → IMS
      - smartretail-ars-updates-{env} (Standard SQS)  → ARS

defaultContentType: application/json

servers:
  eventbridge-local:
    url: http://localhost:4566
    protocol: eventbridge
    description: LocalStack EventBridge (bus = smartretail-events-local)
  eventbridge-aws:
    url: arn:aws:events:{region}:{account}:event-bus/smartretail-events-{env}
    protocol: eventbridge
    description: AWS EventBridge custom bus
    variables:
      region:
        default: eu-west-2
      account:
        description: AWS account ID
      env:
        enum: [dev, demo, prod]

channels:
  smartretail/sis/firehose-http:
    description: |
      Inbound channel. Amazon Data Firehose delivers batches of POS records to
      POST /v1/ingest/events when the X-Amz-Firehose-Request-Id header is present.
      Each record is a base64-encoded SalesEventRequest JSON.
      SIS always responds HTTP 200 to satisfy the Firehose retry contract.
      Access is authenticated via X-Amz-Firehose-Access-Key (validated against
      the Secrets Manager secret injected as SMARTRETAIL_FIREHOSE_ACCESSKEY).
    subscribe:
      operationId: receivePosEventBatch
      summary: Firehose delivers a batch of base64-encoded POS events to SIS.
      message:
        $ref: '#/components/messages/FirehoseBatchRequest'

  smartretail/sis/SalesTransactionEvent:
    description: |
      Published to EventBridge bus `smartretail-events-{env}` with
      source "smartretail.sis" and detail-type "SalesTransactionEvent".
      Triggered once per accepted, non-duplicate transaction.
    publish:
      operationId: publishSalesTransactionEvent
      summary: A POS or e-commerce sale has been ingested.
      message:
        $ref: '#/components/messages/SalesTransactionEvent'

components:
  messages:
    FirehoseBatchRequest:
      name: FirehoseBatchRequest
      title: Firehose Batch Delivery
      contentType: application/json
      payload:
        $ref: '#/components/schemas/FirehoseBatchRequest'

    SalesTransactionEvent:
      name: SalesTransactionEvent
      title: Sales Transaction Event
      contentType: application/json
      headers:
        type: object
        properties:
          source:
            type: string
            const: smartretail.sis
            description: EventBridge envelope — source field.
          detail-type:
            type: string
            const: SalesTransactionEvent
            description: EventBridge envelope — detail-type field.
      payload:
        $ref: '#/components/schemas/SalesTransactionEventPayload'

  schemas:
    FirehoseBatchRequest:
      type: object
      required: [requestId, timestamp, records]
      properties:
        requestId:
          type: string
          description: Unique ID assigned by Firehose for this delivery attempt.
          example: "aae8a6d3-f4a2-4b6c-9f5e-1234567890ab"
        timestamp:
          type: integer
          format: int64
          description: Epoch milliseconds when Firehose created this batch.
        records:
          type: array
          items:
            $ref: '#/components/schemas/FirehoseBatchRecord'

    FirehoseBatchRecord:
      type: object
      required: [data]
      properties:
        data:
          type: string
          format: byte
          description: Base64-encoded SalesEventRequest JSON.

    SalesTransactionEventPayload:
      type: object
      required:
        - transactionId
        - skuId
        - dcId
        - storeId
        - quantity
        - unitPrice
        - channel
        - eventTimestamp
      properties:
        transactionId:
          type: string
          format: uuid
          description: Unique sale identifier.
        skuId:
          type: string
          maxLength: 50
          example: SKU-4423
        dcId:
          type: string
          maxLength: 50
          example: DC-LONDON
        storeId:
          type: string
          maxLength: 50
          example: STORE-001
        quantity:
          type: integer
          minimum: 1
          example: 5
        unitPrice:
          type: number
          format: double
          minimum: 0
          example: 12.99
        channel:
          type: string
          enum: [POS, ECOMMERCE]
        eventTimestamp:
          type: string
          format: date-time
          example: "2026-05-15T14:23:00Z"

spring:
  application:
    name: dfs
  datasource:
    url: jdbc:postgresql://${RDS_PROXY_ENDPOINT:localhost}:5432/smartretail
    username: ${DB_USERNAME:smartretail_admin}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SmartRetail-DFS-Pool
  flyway:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      base-path: /actuator
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

server:
  port: 8084
  shutdown: graceful

logging:
  config: classpath:logback-spring.xml
